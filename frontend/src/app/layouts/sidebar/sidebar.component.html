<aside class="sb" [class.sb--mobile-open]="mobileOpen()" [attr.data-role]="roleKey()">
  <!-- Logo -->
  <div class="sb__logo">
    <span class="sb__logo-mark">
      <lucide-icon [img]="icons.GraduationCap" [size]="16" />
    </span>
    <span class="sb__logo-text">EduPlatform</span>
    <button class="sb__close" type="button" (click)="closeMobile()" aria-label="Закрыть меню">
      <lucide-icon [img]="icons.X" [size]="18" />
    </button>
  </div>

  <!-- Role badge -->
  <div class="sb__role-row">
    <span class="sb__role">
      <span class="sb__role-dot"></span>
      {{ roleLabel() }}
    </span>
  </div>

  <!-- Navigation -->
  <nav class="sb__nav">
    @for (item of navItems(); track item.route) {
      <a
        class="sb__item"
        [routerLink]="item.route"
        routerLinkActive="sb__item--active"
        [routerLinkActiveOptions]="{ exact: false }"
        (click)="closeMobile()"
      >
        <lucide-icon class="sb__item-icon" [img]="item.icon" [size]="18" />
        <span class="sb__item-label">{{ item.label }}</span>
        @if (item.badge) {
          <span class="sb__item-badge">{{ item.badge }}</span>
        }
        <span class="sb__item-marker"></span>
      </a>
    }
  </nav>

  <!-- Bottom -->
  <div class="sb__bottom">
    <a class="sb__item" routerLink="/" (click)="closeMobile()">
      <lucide-icon class="sb__item-icon" [img]="icons.Home" [size]="18" />
      <span class="sb__item-label">Главная</span>
    </a>
    <a class="sb__item" [routerLink]="settingsRoute()" (click)="closeMobile()">
      <lucide-icon class="sb__item-icon" [img]="icons.Settings" [size]="18" />
      <span class="sb__item-label">Настройки</span>
    </a>
    <button class="sb__item sb__item--danger" type="button" (click)="logout()">
      <lucide-icon class="sb__item-icon" [img]="icons.LogOut" [size]="18" />
      <span class="sb__item-label">Выйти</span>
    </button>
  </div>
</aside>
